    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const progressFills = document.querySelectorAll('.mini-progress-fill');
            progressFills.forEach(fill => {
                const targetWidth = fill.style.width; 
                fill.style.width = '0%'; 
                setTimeout(() => {
                    fill.style.transition = 'width 1.5s cubic-bezier(0.22, 1, 0.36, 1)';
                    fill.style.width = targetWidth; 
                }, 200); 
            });

            const percentTexts = document.querySelectorAll('.skill-percent');
            percentTexts.forEach(text => {
                const targetNum = parseInt(text.getAttribute('data-target'));
                let currentNum = 0;
                const duration = 1500; 
                const interval = 20; 
                const step = (targetNum / duration) * interval;
                
                setTimeout(() => {
                    const counter = setInterval(() => {
                        currentNum += step;
                        if(currentNum >= targetNum) {
                            currentNum = targetNum;
                            clearInterval(counter); 
                        }
                        text.innerText = Math.round(currentNum) + '%';
                    }, interval);
                }, 200);
            });
        });
    </script>
